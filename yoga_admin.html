<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Yoga Admin Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { width: 85%; height: 80px; margin: 15px; border-radius: 20px; border: none; font-size: 22px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .next { background: #007bff; color: white; }
        .check { background: #28a745; color: white; height: 120px; }
    </style>
</head>
<body>
    <h1>MEDET YOGA CONTROL</h1>
    <button class="next" onclick="changePose()">СЛЕДУЮЩАЯ ФИГУРА</button>
    <button class="check" onclick="check()">ФИКСИРОВАТЬ РЕЗУЛЬТАТ</button>

    <script>
        const ADMIN_ID = 'medet_yoga_master_2026';
        const peer = new Peer(ADMIN_ID);
        let connections = [];

        peer.on('connection', (conn) => {
            connections.push(conn);
            alert("Экран подключен!");
        });

        function changePose() {
            connections.forEach(c => c.send('NEXT'));
        }

        function check() {
            connections.forEach(c => c.send('CHECK'));
        }
    </script>
</body>
</html>
