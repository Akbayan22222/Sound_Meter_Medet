<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MEDET YOGA ADMIN</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        button { width: 85%; height: 110px; margin: 15px; border-radius: 25px; border: none; font-size: 26px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .start { background: #28a745; color: white; box-shadow: 0 0 20px rgba(40, 167, 69, 0.5); }
        .next { background: #007bff; color: white; }
        .stop { background: #ff3b30; color: white; }
    </style>
</head>
<body>
    <h1>MEDET CONTROL</h1>
    <button class="start" onclick="send('START')">СТАРТ ИГРЫ</button>
    <button class="next" onclick="send('NEXT')">СЛЕДУЮЩАЯ ПОЗА</button>
    <button class="stop" onclick="send('STOP')">ПАУЗА / СТОП</button>

    <script>
        const ADMIN_ID = 'medet_yoga_master_2026';
        const peer = new Peer(ADMIN_ID);
        let connections = [];

        peer.on('connection', (conn) => {
            connections.push(conn);
            alert("Экран подключен!");
        });

        function send(cmd) {
            connections.forEach(c => {
                if (c.open) c.send(cmd);
            });
        }
    </script>
</body>
</html>
