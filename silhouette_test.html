<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Silhouette Test</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    canvas, video {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    video {
      opacity: 0;
      pointer-events: none;
    }

    #msg {
      position: absolute;
      left: 20px;
      top: 20px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="msg">Запуск камеры...</div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <script type="module">
    import * as bodySegmentation from 'https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation/+esm';
    import 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core/+esm';
    import 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl/+esm';
    import 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter/+esm';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');

    let segmenter;

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: 'user',
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      video.srcObject = stream;

      await new Promise((resolve) => {
        video.onloadedmetadata = () => resolve();
      });

      await video.play();
    }

    async function setupSegmentation() {
      segmenter = await bodySegmentation.createSegmenter(
        bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation,
        {
          runtime: 'tfjs',
          modelType: 'general'
        }
      );
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    async function render() {
      if (!segmenter) {
        requestAnimationFrame(render);
        return;
      }

      const people = await segmenter.segmentPeople(video, {
        multiSegmentation: false,
        segmentBodyParts: false
      });

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#020816';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (people.length > 0) {
        const mask = await bodySegmentation.toBinaryMask(
          people,
          { r: 0, g: 255, b: 80, a: 255 },
          { r: 0, g: 0, b: 0, a: 0 },
          false,
          0.7
        );

        bodySegmentation.drawMask(
          canvas,
          video,
          mask,
          1,
          0,
          false
        );

        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        ctx.shadowBlur = 30;
        ctx.shadowColor = 'rgba(0,255,100,0.9)';
        ctx.drawImage(canvas, 0, 0);
        ctx.restore();

        msg.textContent = 'Силуэт найден';
      } else {
        msg.textContent = 'Человек не найден';
      }

      requestAnimationFrame(render);
    }

    async function init() {
      try {
        resizeCanvas();
        await setupCamera();
        msg.textContent = 'Камера готова, загружаю сегментацию...';
        await setupSegmentation();
        msg.textContent = 'Готово';
        render();
      } catch (err) {
        console.error(err);
        msg.textContent = 'Ошибка: камера или модель не запустились';
      }
    }

    window.addEventListener('resize', resizeCanvas);
    init();
  </script>
</body>
</html>
