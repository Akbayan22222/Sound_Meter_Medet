<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Stage 1</title>
<style>
  body { margin:0; overflow:hidden; }

  #threeCanvas {
    position:absolute;
    top:0;
    left:0;
    z-index:0;
  }

  #silhouetteCanvas {
    position:absolute;
    top:0;
    left:0;
    z-index:1;
  }

  video { display:none; }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="silhouetteCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script type="module">
import * as bodySegmentation from 'https://cdn.jsdelivr.net/npm/@tensorflow-models/body-segmentation/+esm';
import 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core/+esm';
import 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl/+esm';
import 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter/+esm';

// ------------------- THREE.JS -------------------

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.domElement.id = "threeCanvas";
document.body.appendChild(renderer.domElement);

// туннель
let frames = [];
for(let i=0;i<20;i++){
  const geo = new THREE.BoxGeometry(8,5,0.2);
  const mat = new THREE.MeshBasicMaterial({
    color:0x00ffff,
    wireframe:true
  });

  const frame = new THREE.Mesh(geo,mat);
  frame.position.z = -i*5;

  scene.add(frame);
  frames.push(frame);
}

// стена
const texture = new THREE.TextureLoader().load('pose1.png');
const wall = new THREE.Mesh(
  new THREE.PlaneGeometry(6,4),
  new THREE.MeshBasicMaterial({
    map:texture,
    transparent:true
  })
);
wall.position.z = -50;
scene.add(wall);

camera.position.z = 5;

// ------------------- СИЛУЭТ -------------------

const video = document.getElementById('video');
const canvas = document.getElementById('silhouetteCanvas');
const ctx = canvas.getContext('2d');

let segmenter;

async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:'user' }
  });

  video.srcObject = stream;
  await video.play();
}

async function setupSeg(){
  segmenter = await bodySegmentation.createSegmenter(
    bodySegmentation.SupportedModels.MediaPipeSelfieSegmentation,
    { runtime:'tfjs' }
  );
}

// ------------------- РЕНДЕР -------------------

async function render(){

  // 3D туннель
  frames.forEach(f=>{
    f.position.z += 0.3;
    if(f.position.z > 5) f.position.z = -100;
  });

  wall.position.z += 0.5;
  if(wall.position.z > 5) wall.position.z = -50;

  renderer.render(scene,camera);

  // силуэт
  if(segmenter){
    const people = await segmenter.segmentPeople(video);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(people.length>0){
      const mask = await bodySegmentation.toBinaryMask(people);

      bodySegmentation.drawMask(
        canvas,
        video,
        mask,
        1,
        0,
        false
      );

      // зеленый цвет
      ctx.globalCompositeOperation='source-in';
      ctx.fillStyle='lime';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      ctx.globalCompositeOperation='source-over';
    }
  }

  requestAnimationFrame(render);
}

// -------------------

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

window.addEventListener('resize',resize);

// старт
(async()=>{
  resize();
  await setupCamera();
  await setupSeg();
  render();
})();
</script>

</body>
</html>
