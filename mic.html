<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Meter Mic</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        button { width: 100%; height: 70px; font-size: 18px; margin: 10px 0; border-radius: 15px; border: none; font-weight: bold; text-transform: uppercase; }
        .btn-1 { background: #ff0055; }
        .btn-2 { background: #007bff; }
        .btn-reset { background: #444; }
        .btn-finish { background: gold; color: black; height: 100px; font-size: 24px; }
        #info { color: #00ffcc; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>ШУМ-МЕТР</h1>
    <p id="info">Соединение...</p>
    
    <button class="btn-1" onclick="startTest(1)">🎤 1 СТОЛ: ТЕСТ</button>
    <button class="btn-2" onclick="startTest(2)">🎤 2 СТОЛ: ТЕСТ</button>
    <br><br>
    <button class="btn-finish" onclick="finish()">🏆 КТО ЖЕҢІМПАЗ?</button>
    <button class="btn-reset" onclick="reset()">СБРОСИТЬ РЕЗУЛЬТАТ</button>

    <script>
        const TARGET_ID = 'medet_noise_battle_2026';
        const peer = new Peer();
        let conn;
        let activeTable = 0;

        peer.on('open', () => {
            conn = peer.connect(TARGET_ID);
            document.getElementById('info').innerText = "ЭКРАНҒА ҚОСЫЛДЫ ✅";
        });

        function reset() { conn.send({reset: true}); activeTable = 0; }
        function finish() { conn.send({finish: true}); activeTable = 0; }

        async function startTest(tableNum) {
            activeTable = tableNum;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.fftSize = 256;
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                const checkVolume = () => {
                    if (activeTable !== tableNum) return;
                    analyser.getByteFrequencyData(dataArray);
                    
                    let sum = 0;
                    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                    let average = sum / dataArray.length;

                    // --- ИСПРАВЛЕННАЯ ФОРМУЛА ЧУВСТВИТЕЛЬНОСТИ ---
                    // Отнимаем 30 (игнорируем фоновый шум) и умножаем на 1.1 для плавности
                    let volume = (average - 30) * 1.1; 
                    if (volume < 0) volume = 0;
                    if (volume > 100) volume = 100;
                    
                    conn.send({ table: tableNum, val: volume });
                    requestAnimationFrame(checkVolume);
                };
                checkVolume();
                
                // Тест длится 6 секунд
                setTimeout(() => { 
                    activeTable = 0; 
                    stream.getTracks().forEach(track => track.stop()); // Выключаем микрофон
                }, 6000); 

            } catch (err) {
                alert("Микрофонға рұқсат беріңіз!");
            }
        }
    </script>
</body>
</html>
