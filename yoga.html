<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER YOGA - MEDET SHOP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; width: 100vw; height: 100vh; object-fit: cover; }
        video { position: absolute; opacity: 0; pointer-events: none; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(255,0,85,0.7); padding: 15px; border-radius: 15px; border: 2px solid #fff; }
        #taskImg { position: absolute; top: 20px; right: 20px; width: 250px; height: auto; border: 4px solid #00ffcc; border-radius: 15px; z-index: 100; background: #111; }
        #result { position: absolute; bottom: 50px; font-size: 80px; text-transform: uppercase; z-index: 100; text-shadow: 0 0 20px #000; display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">ЗАГРУЗКА AI...</div>
        <div id="score" style="font-size: 24px;">СЧЕТ: 0</div>
    </div>

    <img id="taskImg" src="pose1.png" alt="ПОЗА">

    <div id="result">ОТЛИЧНО!</div>

    <video id="video" playsinline muted></video>
    <canvas id="output"></canvas>

    <script>
        const ADMIN_ID = 'medet_yoga_master_2026';
        let detector;
        let video = document.getElementById('video');
        let canvas = document.getElementById('output');
        let ctx = canvas.getContext('2d');
        let peer = new Peer();

        async function init() {
            // Камераны баптау
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            await video.play();

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // AI жүктеу
            const model = poseDetection.SupportedModels.BlazePose;
            detector = await poseDetection.createDetector(model, { runtime: 'tfjs', modelType: 'full' });
            
            document.getElementById('status').innerText = "ГОТОВ К ШОУ";
            render();
            
            // Админмен байланыс
            const conn = peer.connect(ADMIN_ID);
            conn.on('data', (data) => {
                if (data.type === 'CHANGE_POSE') {
                    document.getElementById('taskImg').src = data.pose + '.png';
                }
                if (data.type === 'CHECK') {
                    checkPose();
                }
            });
        }

        async function render() {
            const poses = await detector.estimatePoses(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (poses.length > 0) {
                drawSkeleton(poses[0].keypoints);
            }
            requestAnimationFrame(render);
        }

        function drawSkeleton(keypoints) {
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';

            const adjacentPairs = poseDetection.util.getAdjacentPairs(poseDetection.SupportedModels.BlazePose);
            adjacentPairs.forEach(([i, j]) => {
                const kp1 = keypoints[i];
                const kp2 = keypoints[j];
                if (kp1.score > 0.5 && kp2.score > 0.5) {
                    // Координаттарды экран өлшеміне шақтау
                    const x1 = (kp1.x / video.videoWidth) * canvas.width;
                    const y1 = (kp1.y / video.videoHeight) * canvas.height;
                    const x2 = (kp2.x / video.videoWidth) * canvas.width;
                    const y2 = (kp2.y / video.videoHeight) * canvas.height;
                    
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            });
        }

        function checkPose() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerText = "ПРОВЕРКА...";
            resultDiv.style.color = "#ffcc00";

            setTimeout(() => {
                // Бұл жерде нағыз AI талдау алгоритмі болады
                // Қазірше демонстрация үшін "ЖАҚСЫ" деп шығарамыз
                resultDiv.innerText = "ВЕЛИКОЛЕПНО!";
                resultDiv.style.color = "#00ffcc";
                setTimeout(() => resultDiv.style.display = 'none', 3000);
            }, 2000);
        }

        init();
    </script>
</body>
</html>
