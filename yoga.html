<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER POSE RUN - MEDET SHOP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; }
        #timer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 100px; color: #ff0055; font-family: 'Arial Black', sans-serif; z-index: 100; text-shadow: 0 0 20px #000; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 150px; color: #00ffcc; font-family: 'Arial Black', sans-serif; z-index: 110; display: none; text-shadow: 0 0 40px #00ffcc; }
    </style>
</head>
<body>
    <div id="timer">40</div>
    <div id="msg">CHECK!</div>

    <script>
        const ADMIN_ID = 'medet_yoga_master_2026';
        let video, detector, poses = [], wallImg;
        let currentPoseNum = 1, wallScale = 0.05, wallOpacity = 0, timeLeft = 40;
        let isGameRunning = false;

        function preload() {
            // Сенің жаңа суреттерің (pose1.png, pose2.png...)
            wallImg = loadImage(`pose1.png`); 
        }

        async function setup() {
            createCanvas(windowWidth, windowHeight);
            video = createCapture(VIDEO);
            video.size(640, 480);
            video.hide();

            // AI Детекторды қосу
            const model = poseDetection.SupportedModels.BlazePose;
            detector = await poseDetection.createDetector(model, { runtime: 'tfjs', modelType: 'full' });

            // Админмен байланыс (Ескі логика сақталды)
            const peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(ADMIN_ID);
                conn.on('data', (data) => {
                    if (data.type === 'CHANGE_POSE' || data === 'NEXT') nextRound();
                    if (data.type === 'CHECK') showFlash();
                    isGameRunning = true; // Сигнал келгенде ойын басталады
                });
            });

            setInterval(() => {
                if (isGameRunning && timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft === 0) timeLeft = 40;
                }
            }, 1000);
        }

        async function draw() {
            background(0); // Фон қара (жасыл силуэт жақсы көріну үшін)
            
            if (detector) {
                const detectedPoses = await detector.estimatePoses(video.elt);
                if (detectedPoses.length > 0) {
                    drawGreenGhost(detectedPoses[0].keypoints);
                }
            }

            if (isGameRunning) {
                drawWall();
            }
        }

        function drawGreenGhost(keypoints) {
            push();
            translate(width, 0); scale(-1, 1); // Айна эффектісі
            stroke(0, 255, 100); strokeWeight(15); noFill();
            drawingContext.shadowBlur = 30; drawingContext.shadowColor = 'rgb(0, 255, 100)';
            
            const pairs = poseDetection.util.getAdjacentPairs(poseDetection.SupportedModels.BlazePose);
            pairs.forEach(([i, j]) => {
                const kp1 = keypoints[i], kp2 = keypoints[j];
                if (kp1.score > 0.5 && kp2.score > 0.5) {
                    line(map(kp1.x, 0, 640, 0, width), map(kp1.y, 0, 480, 0, height),
                         map(kp2.x, 0, 640, 0, width), map(kp2.y, 0, 480, 0, height));
                }
            });
            pop();
        }

        function drawWall() {
            push();
            translate(width / 2, height / 2); imageMode(CENTER);
            tint(255, wallOpacity);
            image(wallImg, 0, 0, wallImg.width * wallScale, wallImg.height * wallScale);
            pop();

            wallScale += 0.035; // Қабырғаның жақындау жылдамдығы
            wallOpacity += 10;

            if (wallScale > 5) {
                showFlash();
                nextRound();
            }
        }

        function nextRound() {
            wallScale = 0.05; wallOpacity = 0;
            currentPoseNum = (currentPoseNum % 3) + 1;
            wallImg = loadImage(`pose${currentPoseNum}.png`);
        }

        function showFlash() {
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1000);
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
    </script>
</body>
</html>
