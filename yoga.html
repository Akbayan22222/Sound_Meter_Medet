<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER WALL RUN - PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; }
        #timer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 80px; color: #ff0055; font-family: 'Arial Black'; z-index: 100; text-shadow: 0 0 20px #000; }
        #status-msg { position: absolute; bottom: 30px; color: #555; font-family: sans-serif; font-size: 18px; z-index: 100; }
    </style>
</head>
<body>
    <div id="timer">40</div>
    <div id="status-msg">ЖДУ КОМАНДУ "СТАРТ" ОТ АДМИНА...</div>

    <script>
        const ADMIN_ID = 'medet_yoga_master_2026';
        let video, detector, poses = [], wallImg;
        let currentPoseNum = 1, wallScale = 0.1, wallOpacity = 50; 
        let isMoving = false; // Қабырға қозғалысын бақылау
        let timeLeft = 40;

        function preload() {
            wallImg = loadImage(`pose1.png`);
        }

        async function setup() {
            createCanvas(windowWidth, windowHeight);
            video = createCapture(VIDEO);
            video.size(640, 480);
            video.hide();

            const model = poseDetection.SupportedModels.BlazePose;
            detector = await poseDetection.createDetector(model, { runtime: 'tfjs', modelType: 'full' });

            const peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(ADMIN_ID);
                conn.on('data', (data) => {
                    if (data === 'START') {
                        isMoving = true;
                        document.getElementById('status-msg').style.display = 'none';
                    }
                    if (data === 'STOP') isMoving = false;
                    if (data === 'NEXT') nextRound();
                });
            });

            setInterval(() => {
                if (isMoving && timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft === 0) timeLeft = 40;
                }
            }, 1000);
        }

        async function draw() {
            background(0);

            // 1. ЖАСЫЛ СИЛУЭТ (Әрқашан қосулы)
            if (detector) {
                const detectedPoses = await detector.estimatePoses(video.elt);
                if (detectedPoses.length > 0) {
                    drawGreenGhost(detectedPoses[0].keypoints);
                }
            }

            // 2. ҚАБЫРҒАНЫ КӨРСЕТУ ЖӘНЕ ҚОЗҒАЛТУ
            drawWall();
        }

        function drawGreenGhost(keypoints) {
            push();
            translate(width, 0); scale(-1, 1);
            stroke(0, 255, 100); strokeWeight(15); noFill();
            drawingContext.shadowBlur = 30; drawingContext.shadowColor = 'rgb(0, 255, 100)';
            
            const pairs = poseDetection.util.getAdjacentPairs(poseDetection.SupportedModels.BlazePose);
            pairs.forEach(([i, j]) => {
                const kp1 = keypoints[i], kp2 = keypoints[j];
                if (kp1.score > 0.5 && kp2.score > 0.5) {
                    line(map(kp1.x, 0, 640, 0, width), map(kp1.y, 0, 480, 0, height),
                         map(kp2.x, 0, 640, 0, width), map(kp2.y, 0, 480, 0, height));
                }
            });
            pop();
        }

        function drawWall() {
            push();
            translate(width / 2, height / 2);
            imageMode(CENTER);
            
            // Егер СТАРТ басылмаса - фонда мөлдір болып тұрады
            // Егер СТАРТ басылса - жақындаған сайын анық болады
            let currentOpacity = isMoving ? wallOpacity : 100;
            tint(255, currentOpacity);
            image(wallImg, 0, 0, wallImg.width * wallScale, wallImg.height * wallScale);
            pop();

            if (isMoving) {
                wallScale += 0.035; // Жақындау жылдамдығы
                wallOpacity += 8;

                if (wallScale > 5) {
                    nextRound();
                }
            }
        }

        function nextRound() {
            wallScale = 0.1;
            wallOpacity = 50;
            currentPoseNum = (currentPoseNum % 3) + 1;
            wallImg = loadImage(`pose${currentPoseNum}.png`);
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
    </script>
</body>
</html>
