<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>POSE RUN - MEDET SHOP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        /* Камера толық экранда фон болып тұрады */
        #video { position: absolute; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; width: 100vw; height: 100vh; z-index: 10; transform: scaleX(-1); }
        
        /* Жақындап келе жатқан фигура */
        #wall { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.1);
            z-index: 5; opacity: 0; transition: all 0.1s linear;
        }

        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; color: white; text-shadow: 2px 2px 10px #000; }
        #timer { font-size: 80px; color: #ff0055; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #00ffcc; z-index: 110; display: none; text-shadow: 0 0 20px #000; }
    </style>
</head>
<body>

    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <img id="wall" src="pose1.png">

    <div id="ui">
        <div id="timer">40</div>
        <div style="font-size: 24px;">ПОВТОРИТЕ ПОЗУ!</div>
    </div>

    <div id="msg">PASS!</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wall = document.getElementById('wall');
        const timerEl = document.getElementById('timer');
        const msg = document.getElementById('msg');

        let currentPose = 1;
        let timeLeft = 40;
        let wallScale = 0.1;
        let wallOpacity = 0;

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            await video.play();
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            startWallAnimation();
            startTimer();
        }

        // Фигураның жақындау анимациясы
        function startWallAnimation() {
            wallScale = 0.1;
            wallOpacity = 0;
            wall.src = `pose${currentPose}.png`; // pose1.png, pose2.png...

            const interval = setInterval(() => {
                wallScale += 0.02; // Жақындау жылдамдығы
                wallOpacity += 0.05;
                wall.style.transform = `translate(-50%, -50%) scale(${wallScale})`;
                wall.style.opacity = wallOpacity;

                if (wallScale >= 2.5) { // Фигура экраннан өтіп кетті
                    clearInterval(interval);
                    showFlash();
                    currentPose = currentPose < 3 ? currentPose + 1 : 1; // Келесі фигура
                    setTimeout(startWallAnimation, 1000);
                }
            }, 50);
        }

        function showFlash() {
            msg.style.display = 'block';
            msg.innerText = "CHECK!";
            setTimeout(() => msg.style.display = 'none', 1000);
        }

        function startTimer() {
            const t = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    timeLeft = 40; // Келесі раунд
                }
            }, 1000);
        }

        init();
    </script>
</body>
</html>
