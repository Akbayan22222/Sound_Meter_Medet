<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CYBER WALL RUN - MASTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Arial Black', sans-serif; }
        #timer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 90px; color: #ff0055; z-index: 100; }
        #status-msg { position: absolute; bottom: 30px; color: #00ffcc; font-size: 20px; z-index: 100; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px; }
    </style>
</head>
<body>
    <div id="timer">10</div>
    <div id="status-msg">ИЩУ ПАНЕЛЬ УПРАВЛЕНИЯ...</div>

    <script>
        const ADMIN_ID = 'medet_yoga_2026_pro'; // Жаңа бірегей ID
        let video, detector, poses = [], wallImg;
        let currentPoseNum = 1, wallScale = 0.12, wallOpacity = 50; 
        let isMoving = false, timeLeft = 10;
        let peer, conn;

        function preload() {
            wallImg = loadImage(`pose1.png`);
        }

        async function setup() {
            createCanvas(windowWidth, windowHeight);
            video = createCapture(VIDEO);
            video.size(640, 480);
            video.hide();

            const model = poseDetection.SupportedModels.BlazePose;
            detector = await poseDetection.createDetector(model, { runtime: 'tfjs', modelType: 'full' });

            initPeer();

            setInterval(() => {
                if (isMoving && timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft === 0) timeLeft = 10;
                }
            }, 1000);
        }

        function initPeer() {
            peer = new Peer();
            peer.on('open', () => {
                tryConnect();
            });
        }

        function tryConnect() {
            if (conn) conn.close();
            conn = peer.connect(ADMIN_ID);
            
            conn.on('open', () => {
                document.getElementById('status-msg').innerText = "ПОДКЛЮЧЕНО! ЖДУ СТАРТ...";
            });

            conn.on('data', (data) => {
                if (data === 'START') {
                    isMoving = true;
                    document.getElementById('status-msg').style.display = 'none';
                }
                if (data === 'STOP') isMoving = false;
                if (data === 'NEXT') nextRound();
            });

            conn.on('close', () => {
                document.getElementById('status-msg').style.display = 'block';
                document.getElementById('status-msg').innerText = "СВЯЗЬ ПОТЕРЯНА. ПЕРЕПОДКЛЮЧЕНИЕ...";
                setTimeout(tryConnect, 3000);
            });
        }

        async function draw() {
            background(0);
            if (detector) {
                const detectedPoses = await detector.estimatePoses(video.elt);
                if (detectedPoses.length > 0) drawGreenGhost(detectedPoses[0].keypoints);
            }
            drawWall();
        }

        function drawGreenGhost(keypoints) {
            push();
            translate(width, 0); scale(-1, 1);
            stroke(0, 255, 100); strokeWeight(18); noFill();
            drawingContext.shadowBlur = 45; drawingContext.shadowColor = 'rgb(0, 255, 100)';
            const pairs = poseDetection.util.getAdjacentPairs(poseDetection.SupportedModels.BlazePose);
            pairs.forEach(([i, j]) => {
                const kp1 = keypoints[i], kp2 = keypoints[j];
                if (kp1.score > 0.45 && kp2.score > 0.45) {
                    line(map(kp1.x, 0, 640, 0, width), map(kp1.y, 0, 480, 0, height),
                         map(kp2.x, 0, 640, 0, width), map(kp2.y, 0, 480, 0, height));
                }
            });
            pop();
        }

        function drawWall() {
            push();
            translate(width / 2, height / 2);
            imageMode(CENTER);
            let currentOpacity = isMoving ? wallOpacity : 100;
            tint(255, currentOpacity);
            image(wallImg, 0, 0, wallImg.width * wallScale, wallImg.height * wallScale);
            pop();

            if (isMoving) {
                wallScale += 0.028;
                wallOpacity += 10;
                if (wallScale > 4.5) nextRound();
            }
        }

        function nextRound() {
            wallScale = 0.12; wallOpacity = 50;
            currentPoseNum = (currentPoseNum % 3) + 1;
            wallImg = loadImage(`pose${currentPoseNum}.png`);
        }

        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
    </script>
</body>
</html>
