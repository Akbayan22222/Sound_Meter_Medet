<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>БИТВА ШУМА</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Исправленный текст победителя: теперь он ТОЧНО сверху всех слоев */
        #winner-text { 
            position: absolute; 
            top: 10%; 
            left: 50%;
            transform: translateX(-50%);
            font-size: 80px; 
            color: gold; 
            text-shadow: 0 0 40px rgba(255,215,0,0.8); 
            display: none; 
            text-transform: uppercase;
            z-index: 9999; /* Самый высокий слой */
            background: rgba(0,0,0,0.7); /* Подложка, чтобы текст не сливался */
            padding: 20px 50px;
            border-radius: 20px;
            text-align: center;
        }

        .battle-container { display: flex; width: 90%; justify-content: space-around; align-items: flex-end; height: 60vh; z-index: 1; }
        .table-bar { width: 35%; display: flex; flex-direction: column; align-items: center; }
        .bar-outer { width: 100%; height: 400px; background: #111; border: 5px solid #333; position: relative; border-radius: 20px; overflow: hidden; }
        .bar-inner { width: 100%; height: 0%; position: absolute; bottom: 0; transition: height 0.15s ease-out; }
        
        #bar1 { background: linear-gradient(to top, #ff0055, #ff5588); box-shadow: 0 0 30px #ff0055; }
        #bar2 { background: linear-gradient(to top, #007bff, #00d4ff); box-shadow: 0 0 30px #007bff; }
        
        .score { font-size: 70px; margin-top: 20px; font-weight: bold; }
        .label { font-size: 25px; margin-bottom: 10px; color: #fff; text-shadow: 2px 2px 5px #000; }
    </style>
</head>
<body>
    <div id="winner-text">ЖЕҢІМПАЗ!</div>

    <div class="battle-container">
        <div class="table-bar">
            <div class="label">1 СТОЛ</div>
            <div class="bar-outer"><div id="bar1" class="bar-inner"></div></div>
            <div id="score1" class="score">0</div>
        </div>
        <div class="table-bar">
            <div class="label">2 СТОЛ</div>
            <div class="bar-outer"><div id="bar2" class="bar-inner"></div></div>
            <div id="score2" class="score">0</div>
        </div>
    </div>

    <script>
        const ADMIN_ID = 'medet_noise_battle_2026';
        const peer = new Peer(ADMIN_ID);
        let s1 = 0, s2 = 0;

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.reset) {
                    s1 = 0; s2 = 0;
                    document.getElementById('bar1').style.height = '0%';
                    document.getElementById('bar2').style.height = '0%';
                    document.getElementById('score1').innerText = '0';
                    document.getElementById('score2').innerText = '0';
                    document.getElementById('winner-text').style.display = 'none';
                }
                
                if (data.table === 1) {
                    if (data.val > s1) s1 = Math.floor(data.val);
                    document.getElementById('bar1').style.height = s1 + '%';
                    document.getElementById('score1').innerText = s1;
                }
                if (data.table === 2) {
                    if (data.val > s2) s2 = Math.floor(data.val);
                    document.getElementById('bar2').style.height = s2 + '%';
                    document.getElementById('score2').innerText = s2;
                }

                if (data.finish) {
                    const winText = document.getElementById('winner-text');
                    winText.style.display = 'block';
                    if (s1 === s2) {
                        winText.innerText = "ДОСТЫҚ ЖЕҢДІ!";
                    } else {
                        winText.innerText = s1 > s2 ? "1 СТОЛ ЖЕҢІМПАЗ!" : "2 СТОЛ ЖЕҢІМПАЗ!";
                    }
                }
            });
        });
    </script>
</body>
</html>
